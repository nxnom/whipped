<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px; background: #0d0d12; color: #f0f0f5;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 14px 16px 12px; border-bottom: 1px solid #2a2a35;
      display: flex; align-items: center; gap: 8px;
    }
    .header .logo { font-size: 18px; }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header .sub { font-size: 11px; color: #60607a; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    label { font-size: 11px; font-weight: 600; color: #8888a0; letter-spacing: .3px; display: block; margin-bottom: 4px; }
    input {
      width: 100%; background: #141418; border: 1px solid #2a2a35; border-radius: 6px;
      color: #f0f0f5; padding: 8px 10px; font-size: 12px; font-family: inherit; outline: none;
    }
    input:focus { border-color: #7c6aff; }
    button {
      background: #7c6aff; color: #fff; border: none; border-radius: 6px;
      padding: 9px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .15s;
    }
    button:hover:not(:disabled) { background: #6a57f0; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .status {
      font-size: 11px; color: #8888a0; padding: 8px 10px;
      background: #141418; border-radius: 6px; border: 1px solid #2a2a35; display: none;
    }
    .status.ok { color: #22c55e; border-color: #22c55e30; background: #22c55e10; }
    .status.err { color: #ef4444; border-color: #ef444430; background: #ef444410; }
    .status.show { display: block; }
    .hint {
      font-size: 11px; color: #60607a; line-height: 1.5;
    }
    .hint code { font-family: monospace; color: #c4baff; background: #7c6aff15; padding: 1px 5px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">💬</div>
    <div>
      <h1>Whipped Annotate</h1>
      <div class="sub">Server URL setup</div>
    </div>
  </div>
  <div class="body">
    <div>
      <label>WHIPPED SERVER URL</label>
      <input id="serverUrl" type="url" placeholder="http://localhost:50007" />
    </div>
    <p class="hint">Find this in Whipped → <code>Global Settings</code> → <code>Extension</code>. Once saved, clicking the extension icon toggles the in-page annotator.</p>
    <div class="status" id="status"></div>
    <button id="saveBtn">Save</button>
  </div>
  <script src="settings.js"></script>
</body>
</html>
